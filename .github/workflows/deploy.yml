name: Despliegue continuo

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: innovatech

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Obtener password de ECR para EC2
        id: ecr-password
        run: |
          echo "password=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" >> "$GITHUB_OUTPUT"

      - name: Build y push backend ventas
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-backend-ventas"
          docker build --platform linux/amd64 \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            "./proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Build y push backend despachos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-backend-despachos"
          docker build --platform linux/amd64 \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Build y push frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-frontend"
          docker build --platform linux/amd64 \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            "./proyecto semestral/front_despacho"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Configurar agente SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Verificar SSH al frontend
        env:
          FRONTEND_HOST: ${{ secrets.EC2_FRONTEND_HOST }}
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            ec2-user@"${FRONTEND_HOST}" "echo SSH al frontend OK"

      - name: Desplegar backend en EC2 (subred privada via ProxyJump)
        env:
          FRONTEND_HOST: ${{ secrets.EC2_FRONTEND_HOST }}
          BACKEND_IP: ${{ secrets.EC2_BACKEND_PRIVATE_IP }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_PASSWORD: ${{ steps.ecr-password.outputs.password }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.EC2_DB_PRIVATE_IP }}
        run: |
          set -e
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -J ec2-user@"${FRONTEND_HOST}" \
            ec2-user@"${BACKEND_IP}" bash -s <<REMOTE
          set -e
          echo "${ECR_PASSWORD}" | sudo docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          sudo docker pull "${ECR_REGISTRY}/${PROJECT_NAME}-backend-ventas:latest"
          sudo docker pull "${ECR_REGISTRY}/${PROJECT_NAME}-backend-despachos:latest"
          sudo docker stop innovatech-backend-ventas innovatech-backend-despachos 2>/dev/null || true
          sudo docker rm innovatech-backend-ventas innovatech-backend-despachos 2>/dev/null || true
          sudo docker run -d --name innovatech-backend-ventas --restart unless-stopped \
            -e DB_HOST="${DB_HOST}" -e DB_PORT=3306 -e DB_ENDPOINT="${DB_HOST}" \
            -e DB_NAME="${DB_NAME}" -e DB_USERNAME=root \
            -e DB_PASSWORD="${DB_PASSWORD}" \
            --network host \
            "${ECR_REGISTRY}/${PROJECT_NAME}-backend-ventas:latest"
          sudo docker run -d --name innovatech-backend-despachos --restart unless-stopped \
            -e DB_HOST="${DB_HOST}" -e DB_PORT=3306 -e DB_ENDPOINT="${DB_HOST}" \
            -e DB_NAME="${DB_NAME}" -e DB_USERNAME=root \
            -e DB_PASSWORD="${DB_PASSWORD}" \
            --network host \
            "${ECR_REGISTRY}/${PROJECT_NAME}-backend-despachos:latest"
          echo "Esperando APIs Spring Boot..."
          sleep 60
          curl -sf http://127.0.0.1:8080/api/v1/ventas > /dev/null && echo "API ventas OK" || sudo docker logs innovatech-backend-ventas --tail 20
          curl -sf http://127.0.0.1:8081/api/v1/despachos > /dev/null && echo "API despachos OK" || sudo docker logs innovatech-backend-despachos --tail 20
          REMOTE

      - name: Desplegar frontend en EC2
        env:
          FRONTEND_HOST: ${{ secrets.EC2_FRONTEND_HOST }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_PASSWORD: ${{ steps.ecr-password.outputs.password }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          BACKEND_HOST: ${{ secrets.EC2_BACKEND_PRIVATE_IP }}
        run: |
          set -e
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            ec2-user@"${FRONTEND_HOST}" bash -s <<REMOTE
          set -e
          echo "${ECR_PASSWORD}" | sudo docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          sudo docker pull "${ECR_REGISTRY}/${PROJECT_NAME}-frontend:latest"
          sudo docker stop innovatech-frontend 2>/dev/null || true
          sudo docker rm innovatech-frontend 2>/dev/null || true
          sudo docker run -d --name innovatech-frontend --restart unless-stopped \
            -e BACKEND_HOST="${BACKEND_HOST}" \
            -p 80:8080 \
            "${ECR_REGISTRY}/${PROJECT_NAME}-frontend:latest"
          REMOTE
