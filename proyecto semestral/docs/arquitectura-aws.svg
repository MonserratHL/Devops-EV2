<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 820" font-family="Amazon Ember, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #232F3E; }
      .subtitle { font-size: 13px; fill: #545B64; }
      .label { font-size: 12px; fill: #232F3E; font-weight: 600; }
      .sublabel { font-size: 11px; fill: #545B64; }
      .zone-title { font-size: 13px; font-weight: 700; fill: #232F3E; }
      .box { fill: #FFFFFF; stroke: #879596; stroke-width: 1.5; rx: 6; }
      .vpc { fill: #F2F8F0; stroke: #7AA116; stroke-width: 2; rx: 8; }
      .subnet-pub { fill: #E8F4FC; stroke: #0073BB; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 6; }
      .subnet-priv { fill: #FFF9E6; stroke: #C7131F; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 6; }
      .arrow { fill: none; stroke: #232F3E; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-green { stroke: #7AA116; }
      .arrow-blue { stroke: #0073BB; }
      .port { font-size: 10px; fill: #0073BB; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#232F3E"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="820" fill="#FAFAFA"/>
  <text x="40" y="42" class="title">Innovatech Chile  Arquitectura AWS (EP2 DevOps)</text>
  <text x="40" y="64" class="subtitle">Region us-east-1 · VPC 10.0.0.0/16 · 3 capas · CI/CD GitHub Actions</text>

  <!-- Internet / Usuario -->
  <image x="40" y="110" width="48" height="48" xlink:href="https://icons.terrastruct.com/aws%2FGeneral%2FUsers.svg"/>
  <text x="40" y="175" class="label">Usuarios</text>
  <text x="40" y="192" class="sublabel">HTTP :80</text>

  <!-- GitHub Actions (fuera de AWS) -->
  <rect x="900" y="90" width="260" height="120" class="box"/>
  <image x="920" y="105" width="40" height="40" xlink:href="https://icons.terrastruct.com/dev%2Fgithub.svg"/>
  <text x="970" y="125" class="label">GitHub Actions</text>
  <text x="970" y="142" class="sublabel">Rama deploy</text>
  <text x="920" y="165" class="sublabel">Build  Push ECR  SSH ProxyJump</text>
  <text x="920" y="182" class="sublabel">Bastion: EC2 Frontend</text>

  <!-- AWS Cloud boundary -->
  <rect x="180" y="85" width="680" height="680" fill="#FFFFFF" stroke="#FF9900" stroke-width="2" rx="10"/>
  <text x="200" y="115" class="zone-title" fill="#FF9900">AWS Cloud</text>

  <!-- VPC -->
  <rect x="200" y="130" width="640" height="610" class="vpc"/>
  <image x="210" y="138" width="28" height="28" xlink:href="https://icons.terrastruct.com/aws%2FNetworking%20%26%20Content%20Delivery%2FAmazon-VPC.svg"/>
  <text x="245" y="158" class="zone-title">Amazon VPC (10.0.0.0/16)</text>

  <!-- Internet Gateway -->
  <image x="420" y="175" width="40" height="40" xlink:href="https://icons.terrastruct.com/aws%2FNetworking%20%26%20Content%20Delivery%2FAmazon-VPC-Internet-Gateway.svg"/>
  <text x="395" y="228" class="sublabel" text-anchor="middle">Internet Gateway</text>

  <!-- Subred publica -->
  <rect x="220" y="250" width="280" height="220" class="subnet-pub"/>
  <text x="240" y="275" class="label">Subred publica</text>
  <text x="240" y="292" class="sublabel">10.0.1.0/24 · us-east-1a</text>

  <!-- EC2 Frontend -->
  <rect x="240" y="310" width="240" height="130" class="box"/>
  <image x="255" y="325" width="44" height="44" xlink:href="https://icons.terrastruct.com/aws%2FCompute%2FAmazon-EC2.svg"/>
  <text x="310" y="345" class="label">EC2 innovatech-frontend</text>
  <text x="310" y="362" class="sublabel">Docker: nginx + React</text>
  <text x="310" y="378" class="sublabel">Puerto 80 (unico acceso Internet)</text>
  <text x="310" y="394" class="sublabel">Bastion SSH para CI/CD</text>
  <image x="255" y="405" width="22" height="22" xlink:href="https://icons.terrastruct.com/aws%2FSecurity%2C%20Identity%20%26%20Compliance%2FAWS-WAF.svg" opacity="0"/>
  <rect x="255" y="405" width="200" height="22" fill="#FEF3E2" stroke="#FF9900" rx="3"/>
  <text x="265" y="420" class="sublabel" font-size="10">SG: HTTP 80 desde 0.0.0.0/0 · SSH 22</text>

  <!-- NAT Gateway -->
  <image x="530" y="300" width="36" height="36" xlink:href="https://icons.terrastruct.com/aws%2FNetworking%20%26%20Content%20Delivery%2FAmazon-VPC-NAT-Gateway.svg"/>
  <text x="500" y="350" class="sublabel">NAT Gateway</text>
  <text x="500" y="365" class="sublabel" font-size="10">Salida ECR (instancias privadas)</text>

  <!-- Subred privada -->
  <rect x="220" y="490" width="600" height="230" class="subnet-priv"/>
  <text x="240" y="515" class="label">Subred privada</text>
  <text x="240" y="532" class="sublabel">10.0.2.0/24 · us-east-1b · Sin IP publica</text>

  <!-- EC2 Backend -->
  <rect x="240" y="550" width="260" height="140" class="box"/>
  <image x="255" y="565" width="44" height="44" xlink:href="https://icons.terrastruct.com/aws%2FCompute%2FAmazon-EC2.svg"/>
  <text x="310" y="585" class="label">EC2 innovatech-backend</text>
  <text x="310" y="602" class="sublabel">Docker: Spring Boot Ventas :8080</text>
  <text x="310" y="618" class="sublabel">Docker: Spring Boot Despachos :8081</text>
  <text x="310" y="634" class="sublabel">Solo trafico desde SG Frontend</text>
  <rect x="255" y="655" width="220" height="22" fill="#FEF3E2" stroke="#FF9900" rx="3"/>
  <text x="265" y="670" class="sublabel" font-size="10">SG: 8080/8081  Frontend · SSH  Frontend</text>

  <!-- EC2 Database -->
  <rect x="530" y="550" width="260" height="140" class="box"/>
  <image x="545" y="565" width="44" height="44" xlink:href="https://icons.terrastruct.com/aws%2FCompute%2FAmazon-EC2.svg"/>
  <text x="600" y="585" class="label">EC2 innovatech-database</text>
  <text x="600" y="602" class="sublabel">Docker: MySQL 8</text>
  <text x="600" y="618" class="sublabel">Volumen: innovatech-mysql-data</text>
  <text x="600" y="634" class="sublabel">Puerto 3306 solo desde Backend</text>
  <image x="545" y="648" width="28" height="28" xlink:href="https://icons.terrastruct.com/aws%2FDatabase%2FAmazon-RDS.svg" opacity="0.3"/>
  <rect x="545" y="655" width="220" height="22" fill="#FEF3E2" stroke="#FF9900" rx="3"/>
  <text x="555" y="670" class="sublabel" font-size="10">SG: 3306  Backend · SSH  Frontend</text>

  <!-- ECR -->
  <rect x="900" y="250" width="260" height="200" class="box"/>
  <image x="920" y="270" width="40" height="40" xlink:href="https://icons.terrastruct.com/aws%2FContainers%2FAmazon-Elastic-Container-Registry.svg"/>
  <text x="970" y="290" class="label">Amazon ECR</text>
  <text x="920" y="320" class="sublabel">innovatech-backend-ventas</text>
  <text x="920" y="337" class="sublabel">innovatech-backend-despachos</text>
  <text x="920" y="354" class="sublabel">innovatech-frontend</text>
  <text x="920" y="385" class="sublabel">Pull via NAT desde EC2 privadas</text>
  <text x="920" y="420" class="sublabel" font-size="10">Etapa Terraform 1</text>

  <!-- Flechas principales -->
  <path d="M 88 150 L 200 150 L 200 380 L 240 380" class="arrow arrow-blue"/>
  <text x="130" y="142" class="port">:80</text>

  <path d="M 360 440 L 360 490" class="arrow"/>
  <text x="370" y="470" class="port">proxy :8080/:8081</text>

  <path d="M 500 620 L 530 620" class="arrow arrow-green"/>
  <text x="505" y="610" class="port">:3306</text>

  <path d="M 548 340 L 548 490" class="arrow arrow-green"/>
  <path d="M 700 380 L 900 350" class="arrow" stroke-dasharray="5 3"/>
  <text x="780" y="365" class="sublabel">docker pull</text>

  <path d="M 1030 210 L 480 360" class="arrow" stroke-dasharray="5 3" stroke="#DD344C"/>
  <text x="750" y="200" class="sublabel" fill="#DD344C">SSH ProxyJump (deploy)</text>

  <!-- Leyenda -->
  <rect x="40" y="720" width="1120" height="70" fill="#FFFFFF" stroke="#879596" rx="6"/>
  <text x="60" y="745" class="label">Flujo de datos en produccion</text>
  <text x="60" y="765" class="sublabel">1. Usuario  Frontend (HTTP 80) · 2. nginx  Backend privado (8080 ventas, 8081 despachos) · 3. Spring Boot  MySQL (3306)</text>
  <text x="60" y="782" class="sublabel">CI/CD: GitHub Actions construye imagenes, las publica en ECR y despliega por SSH al frontend, que actua como bastion hacia el backend privado.</text>
</svg>
