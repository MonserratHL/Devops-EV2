name: Integracion continua

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - feature/**
      - fix/**

jobs:
  validar-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar archivo de entorno
        run: cp "proyecto semestral/.env.example" "proyecto semestral/.env"

      - name: Construir imagenes Docker
        run: |
          docker compose -f "proyecto semestral/docker-compose.yml" build

      - name: Levantar servicios y verificar salud
        run: |
          docker compose -f "proyecto semestral/docker-compose.yml" up -d
          sleep 45
          curl -f http://localhost/api/v1/ventas || exit 1
          curl -f http://localhost/api/v1/despachos || exit 1

      - name: Detener contenedores
        if: always()
        run: docker compose -f "proyecto semestral/docker-compose.yml" down -v
