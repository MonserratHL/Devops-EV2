<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .t1{font-size:20px;font-weight:700;fill:#232F3E}
      .t2{font-size:12px;fill:#545B64}
      .lb{font-size:11px;font-weight:700;fill:#232F3E}
      .sm{font-size:10px;fill:#545B64}
      .arr{fill:none;stroke:#232F3E;stroke-width:2;marker-end:url(#ah)}
      .arr-b{stroke:#0073BB}
      .arr-g{stroke:#1A7F37}
      .arr-r{stroke:#D13212;stroke-dasharray:6 4}
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#232F3E"/></marker>
    <!-- Icono EC2 (naranja AWS) -->
    <symbol id="ico-ec2" viewBox="0 0 64 64">
      <rect x="4" y="12" width="56" height="40" rx="4" fill="#ED7100"/>
      <rect x="12" y="20" width="40" height="24" rx="2" fill="#FFF" opacity=".9"/>
      <rect x="18" y="26" width="8" height="8" fill="#ED7100"/><rect x="30" y="26" width="8" height="8" fill="#ED7100"/><rect x="42" y="26" width="8" height="8" fill="#ED7100"/>
      <rect x="18" y="36" width="8" height="8" fill="#ED7100"/><rect x="30" y="36" width="8" height="8" fill="#ED7100"/><rect x="42" y="36" width="8" height="8" fill="#ED7100"/>
    </symbol>
    <!-- Icono VPC -->
    <symbol id="ico-vpc" viewBox="0 0 24 24"><path fill="#7AA116" d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.2l7.5 3.7L12 11.6 4.5 7.9 12 4.2zM4 9.4l7 3.4v7.4l-7-3.5V9.4zm16 0v7.3l-7 3.5v-7.4l7-3.4z"/></symbol>
    <!-- Icono ECR -->
    <symbol id="ico-ecr" viewBox="0 0 64 64">
      <rect x="8" y="16" width="48" height="36" rx="4" fill="#ED7100"/>
      <rect x="14" y="22" width="36" height="24" rx="2" fill="none" stroke="#FFF" stroke-width="2"/>
      <path d="M20 34h24M20 28h24M20 40h16" stroke="#FFF" stroke-width="2"/>
    </symbol>
    <!-- Icono NAT -->
    <symbol id="ico-nat" viewBox="0 0 64 64">
      <rect x="10" y="14" width="44" height="36" rx="4" fill="#8C4FFF"/>
      <path d="M22 32h20M32 22v20" stroke="#FFF" stroke-width="3"/>
    </symbol>
    <!-- Icono usuario -->
    <symbol id="ico-user" viewBox="0 0 64 64">
      <circle cx="32" cy="22" r="12" fill="#232F3E"/>
      <path d="M10 54c0-12 10-18 22-18s22 6 22 18" fill="#232F3E"/>
    </symbol>
    <!-- Icono IGW -->
    <symbol id="ico-igw" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="24" fill="none" stroke="#9D5025" stroke-width="3"/>
      <path d="M32 14v36M18 32h28" stroke="#9D5025" stroke-width="3"/>
    </symbol>
  </defs>

  <rect width="1100" height="780" fill="#FAFAFA"/>
  <text x="30" y="36" class="t1">Innovatech Chile  Arquitectura AWS (EP2 DevOps)</text>
  <text x="30" y="56" class="t2">Region us-east-1 | VPC 10.0.0.0/16 | 3 capas | CI/CD GitHub Actions</text>

  <!-- Usuarios -->
  <use href="#ico-user" x="30" y="90" width="50" height="50"/>
  <text x="30" y="152" class="lb">Usuarios</text>
  <text x="30" y="166" class="sm">HTTP :80</text>

  <!-- GitHub Actions -->
  <rect x="900" y="80" width="180" height="100" rx="6" fill="#24292F"/>
  <text x="920" y="108" class="lb" fill="#FFF">GitHub Actions</text>
  <text x="920" y="124" class="sm" fill="#CCC">Rama deploy</text>
  <text x="920" y="140" class="sm" fill="#CCC">Build - Push ECR</text>
  <text x="920" y="156" class="sm" fill="#CCC">SSH ProxyJump</text>

  <!-- AWS Cloud -->
  <rect x="150" y="75" width="700" height="620" rx="8" fill="#FFF" stroke="#FF9900" stroke-width="2"/>
  <text x="170" y="100" class="lb" fill="#FF9900">AWS Cloud</text>

  <!-- VPC -->
  <rect x="170" y="115" width="660" height="560" rx="6" fill="#F2F8F0" stroke="#7AA116" stroke-width="2"/>
  <use href="#ico-vpc" x="178" y="122" width="20" height="20"/>
  <text x="202" y="137" class="lb">Amazon VPC (10.0.0.0/16)</text>

  <!-- IGW -->
  <use href="#ico-igw" x="480" y="145" width="44" height="44"/>
  <text x="468" y="198" class="sm" text-anchor="middle">Internet Gateway</text>

  <!-- Subred publica -->
  <rect x="190" y="210" width="300" height="200" rx="4" fill="#E8F4FC" stroke="#0073BB" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="205" y="232" class="lb">Subred publica 10.0.1.0/24</text>

  <use href="#ico-ec2" x="220" y="250" width="56" height="56"/>
  <text x="285" y="268" class="lb">EC2 Frontend</text>
  <text x="285" y="284" class="sm">Docker: nginx + React</text>
  <text x="285" y="298" class="sm">Puerto 80 (unico acceso Internet)</text>
  <text x="285" y="312" class="sm">Bastion SSH para CI/CD</text>

  <use href="#ico-nat" x="400" y="255" width="48" height="48"/>
  <text x="388" y="318" class="sm" text-anchor="middle">NAT Gateway</text>

  <!-- Subred privada -->
  <rect x="190" y="430" width="620" height="220" rx="4" fill="#FFF8E6" stroke="#C7131F" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="205" y="452" class="lb">Subred privada 10.0.2.0/24 (sin IP publica)</text>

  <use href="#ico-ec2" x="210" y="475" width="56" height="56"/>
  <text x="275" y="493" class="lb">EC2 Backend</text>
  <text x="275" y="509" class="sm">Spring Boot Ventas :8080</text>
  <text x="275" y="523" class="sm">Spring Boot Despachos :8081</text>

  <use href="#ico-ec2" x="500" y="475" width="56" height="56"/>
  <text x="565" y="493" class="lb">EC2 Database</text>
  <text x="565" y="509" class="sm">Docker: MySQL 8 :3306</text>
  <text x="565" y="523" class="sm">Volumen innovatech-mysql-data</text>

  <!-- ECR -->
  <rect x="720" y="200" width="110" height="130" rx="4" fill="#FFF" stroke="#ED7100" stroke-width="1.5"/>
  <use href="#ico-ecr" x="745" y="215" width="60" height="60"/>
  <text x="730" y="290" class="lb">Amazon ECR</text>
  <text x="730" y="306" class="sm">3 repositorios</text>
  <text x="730" y="320" class="sm">Pull via NAT</text>

  <!-- Flechas -->
  <path d="M80 140 L150 320" class="arr arr-b"/>
  <text x="95" y="130" class="sm" fill="#0073BB">:80</text>
  <path d="M305 410 L305 430" class="arr"/>
  <text x="315" y="425" class="sm">:8080 / :8081</text>
  <path d="M470 505 L500 505" class="arr arr-g"/>
  <text x="475" y="495" class="sm" fill="#1A7F37">:3306</text>
  <path d="M448 318 L448 430" class="arr arr-g"/>
  <path d="M720 265 L620 300" class="arr" stroke-dasharray="5 3"/>
  <text x="650" y="255" class="sm">docker pull</text>
  <path d="M900 180 L480 300" class="arr arr-r"/>
  <text x="680" y="175" class="sm" fill="#D13212">SSH deploy</text>

  <!-- Leyenda -->
  <rect x="30" y="700" width="1040" height="60" rx="4" fill="#FFF" stroke="#879596"/>
  <text x="50" y="725" class="lb">Flujo:</text>
  <text x="50" y="742" class="sm">Usuario - HTTP:80 - Frontend (nginx) - Backend :8080/:8081 - MySQL :3306 | CI/CD: GitHub Actions - ECR - SSH bastion (frontend) - backend privado</text>
</svg>
